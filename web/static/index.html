<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynatrace Docs Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <header>
            <h1>Dynatrace Docs Agent</h1>
            <p class="subtitle">Ask technical questions about Dynatrace</p>
        </header>
        <div id="chat" class="chat">
            <div class="message assistant">
                <div class="content">
                    <p>Hi! I can answer technical questions about Dynatrace using the official documentation. What would you like to know?</p>
                </div>
            </div>
        </div>
        <form id="input-form" class="input-area">
            <input type="text" id="message-input" placeholder="Ask about Dynatrace..." autocomplete="off" autofocus>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>
    <script src="/static/chat.js"></script>
</body>
</html>
